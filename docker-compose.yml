services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: inkfit
      POSTGRES_PASSWORD: inkfit
      POSTGRES_DB: inkfit
    volumes:
      - inkfit_pg_data:/var/lib/postgresql/data

volumes:
  inkfit_pg_data:
